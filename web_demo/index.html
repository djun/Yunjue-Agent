<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/svg+xml" href="/icons/yunjue.svg" />
    <title>Yunjue Agent</title>
    <style>
      :root {
        --bg: #f7f7f8;
        --bg-accent: #eef1f4;
        --panel: rgba(255, 255, 255, 0.92);
        --border: #e3e6ea;
        --text: #1f2328;
        --muted: #667085;
        --brand: #10a37f;
        --brand-dark: #0d8b6d;
        --user-bubble: #10a37f;
        --assistant-bubble: #ffffff;
        --warn: #b54708;
        --shadow-soft: 0 8px 22px rgba(15, 23, 42, 0.06);
        --shadow-card: 0 2px 8px rgba(15, 23, 42, 0.05);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--text);
        font-family: "Source Han Sans SC", "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
        background:
          radial-gradient(circle at 8% 8%, var(--bg-accent) 0%, transparent 42%),
          radial-gradient(circle at 92% 88%, #f0f3f6 0%, transparent 38%),
          linear-gradient(130deg, rgba(255, 255, 255, 0.75), rgba(247, 248, 250, 0.8)),
          var(--bg);
      }

      .layout {
        display: grid;
        grid-template-rows: auto 1fr auto;
        max-width: 1260px;
        min-height: 100vh;
        margin: 0 auto;
        padding: 20px 14px 14px;
        gap: 12px;
      }

      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 14px 16px;
        border: 1px solid var(--border);
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(8px);
        box-shadow: var(--shadow-soft);
      }

      .brand {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .brand-title {
        display: inline-flex;
        align-items: center;
        gap: 10px;
      }

      .brand-logo {
        width: 28px;
        height: 28px;
        object-fit: contain;
        flex: 0 0 28px;
      }

      .brand h1 {
        margin: 0;
        font-size: 18px;
        letter-spacing: 0.02em;
      }

      .chat-wrap {
        overflow: hidden;
        border: 1px solid var(--border);
        border-radius: 14px;
        background: var(--panel);
        backdrop-filter: blur(8px);
        display: grid;
        grid-template-rows: 1fr auto;
        box-shadow: var(--shadow-soft);
      }

      .chat {
        padding: 18px;
        overflow-y: auto;
        scroll-behavior: smooth;
      }

      .empty {
        height: 100%;
        display: grid;
        place-items: center;
        color: var(--muted);
        font-size: 15px;
      }

      .row {
        display: flex;
        margin: 8px 0;
      }

      .row.user {
        justify-content: flex-end;
      }

      .row.assistant {
        justify-content: flex-start;
      }

      .bubble {
        max-width: min(88%, 720px);
        padding: 12px 14px;
        border-radius: 12px;
        border: 1px solid transparent;
        white-space: pre-wrap;
        word-break: break-word;
        line-height: 1.56;
        font-size: 15px;
      }

      .row.user .bubble {
        background: var(--user-bubble);
        color: #fff;
      }

      .row.assistant .bubble {
        background: var(--assistant-bubble);
        border-color: var(--border);
        box-shadow: var(--shadow-card);
      }

      .assistant-board {
        width: min(96vw, 1080px);
      }

      .role-section {
        border: 1px solid var(--border);
        border-radius: 10px;
        overflow: hidden;
        background: #ffffff;
      }

      .role-title {
        padding: 10px 12px;
        font-size: 13px;
        min-height: 68px;
        color: var(--muted);
        text-transform: none;
        letter-spacing: 0.02em;
        border-bottom: 1px solid var(--border);
        background: #fbfcfd;
      }

      .role-title.with-role-icon {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .role-title-icon {
        width: 48px;
        height: 48px;
        flex: 0 0 48px;
        object-fit: contain;
      }

      .role-status {
        margin-left: auto;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 11px;
        color: var(--muted);
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 3px 8px;
        background: #ffffff;
      }

      .role-status-dot {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        flex: 0 0 10px;
      }

      .role-status.running .role-status-dot {
        border: 2px solid #c6d0da;
        border-top-color: #3b82f6;
        background: transparent;
        animation: spin 0.9s linear infinite;
      }

      .role-status.done .role-status-dot {
        background: #16a34a;
      }

      .role-status.stopped .role-status-dot {
        background: #f59e0b;
      }

      .role-section.is-collapsible > summary.role-title {
        list-style: none;
        display: flex;
        align-items: center;
        gap: 8px;
        cursor: pointer;
        user-select: none;
      }

      .role-section.is-collapsible > summary.role-title::-webkit-details-marker {
        display: none;
      }

      .role-section.is-collapsible[open] > summary.role-title .collapse-arrow {
        transform: rotate(90deg);
      }

      .role-body {
        margin: 0;
        padding: 10px 12px 12px;
        max-height: 260px;
        overflow: auto;
        font-size: 12px;
        line-height: 1.5;
        color: #1e3a2e;
        font-family: "SFMono-Regular", Menlo, Consolas, monospace;
        white-space: pre-wrap;
      }

      .role-manager {
        border-left: 3px solid #0f9b77;
      }

      .role-tool_developer {
        border-left: 3px solid #7f56d9;
      }

      .role-executor {
        border-left: 3px solid #3b82f6;
      }

      .role-integrator {
        border-left: 3px solid #10a37f;
        background: #fcfefe;
      }

      .role-client {
        border-left: 3px solid #f79009;
        background: #fffaf2;
      }

      .role-content {
        display: grid;
        gap: 8px;
        padding: 10px 12px 12px;
        max-height: 420px;
        overflow-y: auto;
        overflow-x: hidden;
      }

      .subbox {
        border: 1px solid var(--border);
        border-radius: 8px;
        overflow: hidden;
        background: #ffffff;
        box-shadow: none;
      }

      .subbox-title {
        padding: 8px 10px;
        font-size: 12px;
        color: var(--muted);
        border-bottom: 1px solid var(--border);
        text-transform: lowercase;
      }

      .subbox-body {
        margin: 0;
        padding: 10px;
        max-height: 220px;
        overflow: auto;
        font-size: 12px;
        line-height: 1.5;
        color: #1e3a2e;
        font-family: "SFMono-Regular", Menlo, Consolas, monospace;
        white-space: pre-wrap;
      }

      .tool-list {
        display: grid;
        gap: 8px;
        padding: 10px;
      }

      .tool-item {
        border: 1px solid var(--border);
        border-radius: 8px;
        background: #fcfcfd;
        box-shadow: var(--shadow-card);
      }

      .tool-item summary {
        list-style: none;
        display: flex;
        align-items: center;
        gap: 8px;
        cursor: pointer;
        padding: 8px 10px;
        user-select: none;
      }

      .tool-item summary::-webkit-details-marker {
        display: none;
      }

      .collapse-arrow {
        font-size: 12px;
        color: var(--muted);
        transition: transform 0.18s ease;
      }

      .tool-item[open] > summary .collapse-arrow {
        transform: rotate(90deg);
      }

      .tool-name {
        font-size: 12px;
        color: var(--text);
        font-family: "SFMono-Regular", Menlo, Consolas, monospace;
      }

      .tool-state {
        margin-left: auto;
        font-size: 12px;
        color: var(--muted);
      }

      .tool-args {
        margin: 0;
        padding: 0 10px 10px;
        font-size: 12px;
        line-height: 1.5;
        color: #1e3a2e;
        font-family: "SFMono-Regular", Menlo, Consolas, monospace;
        white-space: pre-wrap;
      }

      .tool-icon {
        width: 14px;
        height: 14px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        flex: 0 0 14px;
      }

      .tool-icon.loading::before {
        content: "";
        width: 12px;
        height: 12px;
        border: 2px solid #c6d0da;
        border-top-color: #3b82f6;
        border-radius: 50%;
        animation: spin 0.9s linear infinite;
      }

      .tool-icon.done {
        font-size: 13px;
        line-height: 1;
      }

      .tool-icon.failed {
        font-size: 13px;
        line-height: 1;
      }

      .manager-tool-grid {
        display: grid;
        gap: 8px;
        padding: 10px;
      }

      .manager-tool-card {
        border: 1px solid var(--border);
        border-radius: 8px;
        background: #fafdfc;
        padding: 8px 10px;
        display: grid;
        gap: 6px;
      }

      .manager-tool-head {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .manager-tool-name {
        font-size: 12px;
        color: var(--text);
        font-family: "SFMono-Regular", Menlo, Consolas, monospace;
      }

      .manager-tool-kind {
        margin-left: auto;
        font-size: 11px;
        color: var(--muted);
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 1px 8px;
        white-space: nowrap;
      }

      .manager-tool-guidance {
        font-size: 12px;
        color: #1e3a2e;
        line-height: 1.5;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .integrator-list {
        padding: 10px;
      }

      .reasoning-list {
        padding: 10px;
      }

      .composer {
        border-top: 1px solid var(--border);
        padding: 12px;
        display: grid;
        gap: 10px;
      }

      .status {
        min-height: 18px;
        font-size: 12px;
        color: var(--muted);
      }

      .status.warn {
        color: var(--warn);
      }

      .input-line {
        display: grid;
        grid-template-columns: 1fr auto auto;
        gap: 8px;
      }

      textarea {
        width: 100%;
        min-height: 54px;
        max-height: 170px;
        resize: vertical;
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 12px;
        background: #ffffff;
        color: var(--text);
        font-size: 14px;
        line-height: 1.5;
      }

      button {
        border: 1px solid transparent;
        border-radius: 12px;
        padding: 0 16px;
        font-size: 14px;
        cursor: pointer;
        transition: transform 0.15s ease, opacity 0.15s ease;
      }

      button:active {
        transform: translateY(1px);
      }

      button[disabled] {
        cursor: not-allowed;
        opacity: 0.6;
      }

      #sendBtn {
        background: var(--brand);
        color: #fff;
        box-shadow: 0 4px 12px rgba(16, 163, 127, 0.22);
      }

      #sendBtn:hover:not([disabled]) {
        background: var(--brand-dark);
      }

      #stopBtn {
        background: #ffffff;
        border-color: var(--border);
        color: var(--text);
        box-shadow: 0 1px 4px rgba(15, 23, 42, 0.04);
      }

      @keyframes reveal {
        from {
          opacity: 0;
          transform: translateY(6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes spin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      .row,
      .role-section,
      .assistant-board {
        animation: reveal 0.2s ease;
      }

      @media (max-width: 740px) {
        .layout {
          padding: 10px;
        }

        .topbar {
          flex-direction: column;
          align-items: flex-start;
          gap: 8px;
        }

        .bubble {
          max-width: 94%;
        }

        .input-line {
          grid-template-columns: 1fr;
        }

        #sendBtn,
        #stopBtn {
          height: 44px;
        }
      }
    </style>
  </head>
  <body>
    <main class="layout">
      <header class="topbar">
        <div class="brand">
          <div class="brand-title">
            <img class="brand-logo" src="/icons/yunjue.svg" alt="Yunjue logo" />
            <h1>Yunjue Agent</h1>
          </div>
        </div>
      </header>

      <section class="chat-wrap">
        <div class="chat" id="chat">
          <div class="empty" id="emptyHint">Ask a question to start a new conversation.</div>
        </div>

        <div class="composer">
          <div class="status" id="status">Ready</div>
          <div class="input-line">
            <textarea id="input" placeholder="Type your question... (Shift+Enter for newline, Enter to send)"></textarea>
            <button id="sendBtn" type="button">Send</button>
            <button id="stopBtn" type="button" disabled>Stop</button>
          </div>
        </div>
      </section>
    </main>

    <script>
      const chatEl = document.getElementById("chat");
      const inputEl = document.getElementById("input");
      const sendBtn = document.getElementById("sendBtn");
      const stopBtn = document.getElementById("stopBtn");
      const statusEl = document.getElementById("status");
      const emptyHintEl = document.getElementById("emptyHint");
      const roleIconMap = {
        manager: "/icons/manager.svg",
        tool_developer: "/icons/tool_developer.svg",
        tool_devoloper: "/icons/tool_developer.svg",
        executor: "/icons/executor.svg",
        integrator: "/icons/integrator.svg",
      };
      const roleDisplayNameMap = {
        manager: "Manager",
        tool_developer: "Tool Developer",
        tool_devoloper: "Tool Developer",
        executor: "Executor",
        integrator: "Integrator",
      };

      const threadId = localStorage.getItem("yunjue-thread-id") || `web_${Date.now()}`;
      localStorage.setItem("yunjue-thread-id", threadId);

      let isStreaming = false;
      let controller = null;
      let activeAssistantRole = null;
      let activeAssistantGroup = null;
      const activeRunGroups = [];
      const pendingExecutorToolCalls = [];
      const pendingExecutorToolCallsById = new Map();
      let executorEventSeq = 0;

      function setStatus(text, warn = false) {
        statusEl.textContent = text;
        statusEl.classList.toggle("warn", warn);
      }

      function setStreamingState(streaming) {
        isStreaming = streaming;
        sendBtn.disabled = streaming;
        stopBtn.disabled = !streaming;
        inputEl.disabled = streaming;
      }

      function appendBubble(role, content) {
        if (emptyHintEl) {
          emptyHintEl.remove();
        }
        const row = document.createElement("div");
        row.className = `row ${role}`;
        const bubble = document.createElement("div");
        bubble.className = "bubble";
        bubble.textContent = content;
        row.appendChild(bubble);
        chatEl.appendChild(row);
        chatEl.scrollTop = chatEl.scrollHeight;
      }

      function safeJSON(value) {
        try {
          return JSON.stringify(value, null, 2);
        } catch {
          return String(value);
        }
      }

      function splitGuidanceLines(guidanceText) {
        const raw = String(guidanceText || "").trim();
        if (!raw) {
          return [];
        }
        let lines = raw
          .split(/\r?\n/)
          .map((line) => line.trim())
          .filter(Boolean);
        if (lines.length <= 1) {
          lines = raw
            .split(/[;；]/)
            .map((line) => line.trim())
            .filter(Boolean);
        }
        return lines;
      }

      function parseGuidanceMap(guidanceText) {
        const guidanceMap = new Map();
        const lines = splitGuidanceLines(guidanceText);
        for (const line of lines) {
          const matched = line.match(/^([^:：]+)[:：]\s*(.+)$/);
          if (!matched) {
            continue;
          }
          const name = matched[1].trim();
          const text = matched[2].trim();
          if (!name) {
            continue;
          }
          if (guidanceMap.has(name) && text) {
            guidanceMap.set(name, `${guidanceMap.get(name)} ${text}`);
          } else {
            guidanceMap.set(name, text);
          }
        }
        return guidanceMap;
      }

      function formatArgumentLines(args) {
        const lines = [];
        const walk = (value, path) => {
          if (Array.isArray(value)) {
            if (!value.length) {
              lines.push(`${path || "value"}: []`);
              return;
            }
            value.forEach((item, idx) => walk(item, `${path || "value"}[${idx}]`));
            return;
          }
          if (value && typeof value === "object") {
            const entries = Object.entries(value);
            if (!entries.length) {
              lines.push(`${path || "value"}: {}`);
              return;
            }
            for (const [key, item] of entries) {
              const next = path ? `${path}.${key}` : key;
              walk(item, next);
            }
            return;
          }
          lines.push(`${path || "value"}: ${String(value)}`);
        };
        walk(args, "");
        return lines.length ? lines : ["(no arguments)"];
      }

      function nextExecutorEventKey(prefix) {
        executorEventSeq += 1;
        return `${prefix}_${executorEventSeq}`;
      }

      function parseSSEBlock(block) {
        const dataLines = block
          .split("\n")
          .filter((line) => line.startsWith("data:"))
          .map((line) => line.slice(5).trim())
          .join("\n");
        if (!dataLines) {
          return null;
        }
        try {
          return JSON.parse(dataLines);
        } catch {
          return null;
        }
      }

      function createAssistantGroup(role) {
        if (emptyHintEl) {
          emptyHintEl.remove();
        }
        const row = document.createElement("div");
        row.className = "row assistant";
        const bubble = document.createElement("div");
        bubble.className = "bubble assistant-board";
        const section = document.createElement("section");
        section.className = `role-section role-${role}`;
        const title = document.createElement("div");
        title.className = "role-title";
        const roleIcon = roleIconMap[role];
        const label = document.createElement("span");
        label.textContent = roleDisplayNameMap[role] || role;
        if (roleIcon) {
          title.classList.add("with-role-icon");
        }
        if (roleIcon) {
          const roleIconEl = document.createElement("img");
          roleIconEl.className = "role-title-icon";
          roleIconEl.src = roleIcon;
          roleIconEl.alt = `${role} icon`;
          title.appendChild(roleIconEl);
        }
        title.appendChild(label);
        const statusWrap = document.createElement("span");
        statusWrap.className = "role-status running";
        const statusDot = document.createElement("span");
        statusDot.className = "role-status-dot";
        const statusText = document.createElement("span");
        statusText.textContent = "Running";
        statusWrap.appendChild(statusDot);
        statusWrap.appendChild(statusText);
        title.appendChild(statusWrap);

        const content = document.createElement("div");
        content.className = "role-content";
        section.appendChild(title);
        section.appendChild(content);
        bubble.appendChild(section);
        row.appendChild(bubble);
        chatEl.appendChild(row);
        chatEl.scrollTop = chatEl.scrollHeight;
        return { role, content, subboxes: new Map(), statusWrap, statusText };
      }

      function setRoleStatus(group, status) {
        if (!group || !group.statusWrap || !group.statusText) {
          return;
        }
        group.statusWrap.className = `role-status ${status}`;
        if (status === "running") {
          group.statusText.textContent = "Running";
          return;
        }
        if (status === "done") {
          group.statusText.textContent = "Completed";
          return;
        }
        group.statusText.textContent = "Stopped";
      }

      function trackActiveRoleGroup(group) {
        if (!group) {
          return;
        }
        if (activeAssistantGroup && activeAssistantGroup !== group) {
          setRoleStatus(activeAssistantGroup, "done");
        }
        setRoleStatus(group, "running");
        if (!activeRunGroups.includes(group)) {
          activeRunGroups.push(group);
        }
      }

      function finishRoleGroups(status = "done") {
        for (const group of activeRunGroups) {
          setRoleStatus(group, status);
        }
      }

      function finalizePendingExecutorToolCalls(status = "done") {
        const pending = pendingExecutorToolCalls.splice(0, pendingExecutorToolCalls.length);
        for (const node of pending) {
          if (node.toolCallId) {
            pendingExecutorToolCallsById.delete(node.toolCallId);
          }
          setIconState(node.icon, node.stateEl, status);
        }
      }

      function getOrCreateAssistantGroup(role) {
        const roleName = role || "unknown";
        if (activeAssistantGroup && activeAssistantRole === roleName) {
          trackActiveRoleGroup(activeAssistantGroup);
          return activeAssistantGroup;
        }
        const previousGroup = activeAssistantGroup;
        activeAssistantRole = roleName;
        activeAssistantGroup = createAssistantGroup(roleName);
        if (previousGroup && previousGroup !== activeAssistantGroup) {
          setRoleStatus(previousGroup, "done");
        }
        trackActiveRoleGroup(activeAssistantGroup);
        return activeAssistantGroup;
      }

      function createSubbox(group, key, titleText, isList = false, listClass = "tool-list") {
        const box = document.createElement("section");
        box.className = "subbox";
        const title = document.createElement("div");
        title.className = "subbox-title";
        title.textContent = titleText;
        box.appendChild(title);

        let payloadNode;
        if (isList) {
          payloadNode = document.createElement("div");
          payloadNode.className = listClass;
        } else {
          payloadNode = document.createElement("pre");
          payloadNode.className = "subbox-body";
        }
        box.appendChild(payloadNode);
        group.content.appendChild(box);

        const subbox = isList
          ? { type: "list", box, list: payloadNode, items: new Map() }
          : { type: "text", box, body: payloadNode };
        group.subboxes.set(key, subbox);
        return subbox;
      }

      function removeSubbox(group, key) {
        if (!group.subboxes.has(key)) {
          return;
        }
        const subbox = group.subboxes.get(key);
        if (subbox?.box && subbox.box.parentElement) {
          subbox.box.remove();
        }
        group.subboxes.delete(key);
      }

      function ensureTextSubbox(group, key, titleText) {
        if (group.subboxes.has(key)) {
          return group.subboxes.get(key);
        }
        return createSubbox(group, key, titleText, false);
      }

      function ensureListSubbox(group, key, titleText, listClass = "tool-list") {
        if (group.subboxes.has(key)) {
          return group.subboxes.get(key);
        }
        return createSubbox(group, key, titleText, true, listClass);
      }

      function appendLinesToTextSubbox(group, key, titleText, lines) {
        if (!lines || !lines.length) {
          return;
        }
        const subbox = ensureTextSubbox(group, key, titleText);
        const text = lines.join("\n");
        subbox.body.textContent = subbox.body.textContent
          ? `${subbox.body.textContent}\n\n${text}`
          : text;
        subbox.body.scrollTop = subbox.body.scrollHeight;
      }

      function appendNewTextSubbox(group, keyPrefix, titleText, lines) {
        const key = nextExecutorEventKey(keyPrefix);
        appendLinesToTextSubbox(group, key, titleText, lines);
      }

      function appendNewCollapsibleTextSubbox(group, keyPrefix, titleText, summaryText, bodyText) {
        const key = nextExecutorEventKey(keyPrefix);
        const subbox = createSubbox(group, key, titleText, true, "reasoning-list");
        const details = document.createElement("details");
        details.className = "tool-item";

        const summary = document.createElement("summary");
        const arrow = document.createElement("span");
        arrow.className = "collapse-arrow";
        arrow.textContent = "▸";
        const icon = document.createElement("span");
        icon.className = "tool-icon";
        icon.textContent = "💭";
        const label = document.createElement("span");
        label.className = "tool-name";
        label.textContent = summaryText || "reasoning";

        summary.appendChild(arrow);
        summary.appendChild(icon);
        summary.appendChild(label);

        const body = document.createElement("pre");
        body.className = "tool-args";
        body.textContent = bodyText || "";

        details.appendChild(summary);
        details.appendChild(body);
        subbox.list.appendChild(details);
      }

      function setIconState(icon, statusEl, status) {
        icon.className = "tool-icon";
        icon.textContent = "";
        if (status === "creating" || status === "calling") {
          icon.classList.add("loading");
          statusEl.textContent = status === "creating" ? "Creating" : "Calling";
          return;
        }
        if (status === "failed") {
          icon.classList.add("failed");
          icon.textContent = "❌";
          statusEl.textContent = "Failed";
          return;
        }
        if (status === "created" || status === "done") {
          icon.classList.add("done");
          icon.textContent = "✅";
          statusEl.textContent = status === "created" ? "Created" : "Completed";
        }
      }

      function renderManager(payload) {
        const group = getOrCreateAssistantGroup("manager");
        const subbox = ensureListSubbox(group, "manager_tools_guidance", "tools & guidance", "manager-tool-grid");
        subbox.list.innerHTML = "";

        const requiredTools = (payload.required_tool_names || []).map((x) => String(x).trim()).filter(Boolean);
        const pendingNames = (payload.pending_tool_requests || [])
          .map((req) => String(req?.name || "").trim())
          .filter(Boolean);
        if (pendingNames.length > 0) {
          setRoleStatus(group, "done");
          renderToolDeveloper({
            role: "tool_developer",
            message_type: "state_update",
            pending_tool_requests: payload.pending_tool_requests || [],
            created_tools: [],
          });
        }
        const guidanceMap = parseGuidanceMap(payload.tool_usage_guidance || "");
        const requiredSet = new Set(requiredTools);
        const pendingSet = new Set(pendingNames);

        const ordered = [];
        for (const name of requiredTools) {
          if (!ordered.includes(name)) {
            ordered.push(name);
          }
        }
        for (const name of pendingNames) {
          if (!ordered.includes(name)) {
            ordered.push(name);
          }
        }

        if (!ordered.length) {
          const card = document.createElement("div");
          card.className = "manager-tool-card";
          card.textContent = "no tools";
          subbox.list.appendChild(card);
          return;
        }

        for (const name of ordered) {
          const isAvailable = requiredSet.has(name);
          const isNew = pendingSet.has(name);
          let kindLabel = "available";
          let emoji = "🟢";
          if (isAvailable && isNew) {
            kindLabel = "available + new";
            emoji = "🟡";
          } else if (isNew) {
            kindLabel = "new tools to create";
            emoji = "🆕";
          }
          const guidance = guidanceMap.get(name) || "no guidance";

          const card = document.createElement("div");
          card.className = "manager-tool-card";
          const head = document.createElement("div");
          head.className = "manager-tool-head";
          const nameEl = document.createElement("div");
          nameEl.className = "manager-tool-name";
          nameEl.textContent = `${emoji} ${name}`;
          const kindEl = document.createElement("div");
          kindEl.className = "manager-tool-kind";
          kindEl.textContent = kindLabel;
          const body = document.createElement("div");
          body.className = "manager-tool-guidance";
          body.textContent = guidance;
          head.appendChild(nameEl);
          head.appendChild(kindEl);
          card.appendChild(head);
          card.appendChild(body);
          subbox.list.appendChild(card);
        }
      }

      function upsertToolDeveloperItem(subbox, name, description, status) {
        let node = subbox.items.get(name);
        if (!node) {
          const details = document.createElement("details");
          details.className = "tool-item";

          const summary = document.createElement("summary");
          const arrow = document.createElement("span");
          arrow.className = "collapse-arrow";
          arrow.textContent = "▸";
          const icon = document.createElement("span");
          icon.className = "tool-icon";
          const nameEl = document.createElement("span");
          nameEl.className = "tool-name";
          nameEl.textContent = name;
          const stateEl = document.createElement("span");
          stateEl.className = "tool-state";
          summary.appendChild(arrow);
          summary.appendChild(icon);
          summary.appendChild(nameEl);
          summary.appendChild(stateEl);

          const desc = document.createElement("pre");
          desc.className = "tool-args";

          details.appendChild(summary);
          details.appendChild(desc);
          subbox.list.appendChild(details);

          node = { details, icon, stateEl, desc };
          subbox.items.set(name, node);
        }
        if (description) {
          node.desc.textContent = description;
        } else if (!node.desc.textContent) {
          node.desc.textContent = "no description";
        }
        setIconState(node.icon, node.stateEl, status);
      }

      function renderToolDeveloper(payload) {
        const group = getOrCreateAssistantGroup("tool_developer");
        const pendingPresent = Object.prototype.hasOwnProperty.call(payload, "pending_tool_requests");
        const pendingRequests = pendingPresent ? payload.pending_tool_requests || [] : [];
        const createdTools = payload.created_tools || [];

        if (createdTools.length > 0) {
          removeSubbox(group, "tool_developer_status");
          const subbox = ensureListSubbox(group, "tool_developer_tools", "tools", "tool-list");
          for (const tool of createdTools) {
            const name = tool.name || "unknown_tool";
            upsertToolDeveloperItem(subbox, name, tool.description || "", "created");
          }
          if (!pendingPresent || pendingRequests.length === 0) {
            setRoleStatus(group, "done");
          }
          return;
        }

        if (!pendingPresent || pendingRequests.length === 0) {
          removeSubbox(group, "tool_developer_tools");
          appendLinesToTextSubbox(group, "tool_developer_status", "status", ["no new tools needed"]);
          setRoleStatus(group, "done");
          return;
        }
        removeSubbox(group, "tool_developer_status");
        const subbox = ensureListSubbox(group, "tool_developer_tools", "tools", "tool-list");

        const createdMap = new Map();
        for (const tool of createdTools) {
          createdMap.set(tool.name, tool.description || "");
        }

        if (pendingPresent) {
          for (const req of pendingRequests) {
            const name = req?.name || "unknown_tool";
            const desc = req?.description || "";
            const status = createdMap.has(name) ? "created" : "creating";
            upsertToolDeveloperItem(subbox, name, createdMap.get(name) || desc, status);
          }
        }

        for (const tool of createdTools) {
          const name = tool.name || "unknown_tool";
          upsertToolDeveloperItem(subbox, name, tool.description || "", "created");
        }
      }

      function addExecutorToolCall(group, name, args, trackPending = true, toolCallId = null) {
        const key = nextExecutorEventKey("executor_tool");
        const subbox = createSubbox(group, key, "tool", true, "tool-list");
        const details = document.createElement("details");
        details.className = "tool-item";
        const summary = document.createElement("summary");
        const arrow = document.createElement("span");
        arrow.className = "collapse-arrow";
        arrow.textContent = "▸";
        const icon = document.createElement("span");
        const nameEl = document.createElement("span");
        nameEl.className = "tool-name";
        nameEl.textContent = name;
        const stateEl = document.createElement("span");
        stateEl.className = "tool-state";
        summary.appendChild(arrow);
        summary.appendChild(icon);
        summary.appendChild(nameEl);
        summary.appendChild(stateEl);

        const argsEl = document.createElement("pre");
        argsEl.className = "tool-args";
        argsEl.textContent = formatArgumentLines(args).join("\n");

        details.appendChild(summary);
        details.appendChild(argsEl);
        subbox.list.appendChild(details);

        setIconState(icon, stateEl, "calling");
        const node = { icon, stateEl, toolCallId, toolName: name };
        if (trackPending) {
          pendingExecutorToolCalls.push(node);
          if (toolCallId) {
            pendingExecutorToolCallsById.set(toolCallId, node);
          }
        }
        return node;
      }

      function completeExecutorToolCall(group, status = "done", toolCallId = null, toolName = null) {
        let node = null;
        if (toolCallId && pendingExecutorToolCallsById.has(toolCallId)) {
          node = pendingExecutorToolCallsById.get(toolCallId);
          const idx = pendingExecutorToolCalls.indexOf(node);
          if (idx >= 0) {
            pendingExecutorToolCalls.splice(idx, 1);
          }
        } else if (toolName) {
          const idx = pendingExecutorToolCalls.findIndex((item) => item.toolName === toolName);
          if (idx >= 0) {
            node = pendingExecutorToolCalls[idx];
            pendingExecutorToolCalls.splice(idx, 1);
          }
        } else {
          node = pendingExecutorToolCalls.shift();
        }
        if (!node) {
          node = addExecutorToolCall(group, "unknown_tool", {}, false);
        }
        if (node.toolCallId) {
          pendingExecutorToolCallsById.delete(node.toolCallId);
        }
        setIconState(node.icon, node.stateEl, status);
      }

      function renderExecutor(payload) {
        const group = getOrCreateAssistantGroup("executor");
        if (payload.message_type === "ai") {
          const reasoning = String(payload.content || "").trim();
          if (reasoning) {
            appendNewCollapsibleTextSubbox(
              group,
              "executor_reasoning",
              "reasoning",
              "reasoning",
              reasoning,
            );
          }
          for (const toolCall of payload.tool_calls || []) {
            addExecutorToolCall(
              group,
              toolCall.name || "unknown_tool",
              toolCall.arguments ?? {},
              true,
              toolCall.call_id || null,
            );
          }
          return;
        }
        if (payload.message_type === "tool") {
          const status = String(payload.tool_status || "").toLowerCase() === "error" ? "failed" : "done";
          completeExecutorToolCall(
            group,
            status,
            payload.tool_call_id || null,
            payload.tool_name || null,
          );
          return;
        }
        if (payload.message_type === "system" && String(payload.content || "").includes("Recur limit exceeded")) {
          appendNewTextSubbox(group, "executor_context", "context summary", ["summarizing context..."]);
          return;
        }
        if (payload.message_type === "context_summary") {
          appendNewTextSubbox(group, "executor_context", "context summary", [
            `summarized context: ${payload.content || ""}`,
          ]);
        }
      }

      function renderIntegrator(payload) {
        const group = getOrCreateAssistantGroup("integrator");
        const subbox = ensureListSubbox(group, "integrator_final", "final answer", "integrator-list");
        subbox.list.innerHTML = "";

        const details = document.createElement("details");
        details.className = "tool-item";

        const summary = document.createElement("summary");
        const arrow = document.createElement("span");
        arrow.className = "collapse-arrow";
        arrow.textContent = "▸";
        const icon = document.createElement("span");
        icon.className = "tool-icon done";
        icon.textContent = "✅";
        const answerEl = document.createElement("span");
        answerEl.className = "tool-name";
        answerEl.textContent = String(payload.content || "(empty final answer)");
        summary.appendChild(arrow);
        summary.appendChild(icon);
        summary.appendChild(answerEl);

        const reasoning = document.createElement("pre");
        reasoning.className = "tool-args";
        reasoning.textContent = String(payload.reasoning_summary || "no reasoning");

        details.appendChild(summary);
        details.appendChild(reasoning);
        subbox.list.appendChild(details);
      }

      function appendClientNotice(sectionName, message) {
        const group = getOrCreateAssistantGroup("client");
        appendLinesToTextSubbox(group, sectionName, sectionName, [message]);
      }

      function renderPayload(payload) {
        if (payload.role === "manager") {
          renderManager(payload);
          return;
        }
        if (payload.role === "tool_developer") {
          renderToolDeveloper(payload);
          return;
        }
        if (payload.role === "executor") {
          renderExecutor(payload);
          return;
        }
        if (payload.role === "integrator" && payload.message_type === "final_answer") {
          renderIntegrator(payload);
        }
      }

      function clearConversationRenderState() {
        activeAssistantRole = null;
        activeAssistantGroup = null;
        activeRunGroups.length = 0;
        pendingExecutorToolCalls.length = 0;
        pendingExecutorToolCallsById.clear();
        executorEventSeq = 0;
      }

      async function sendMessage() {
        const question = inputEl.value.trim();
        if (!question || isStreaming) {
          return;
        }

        appendBubble("user", question);
        inputEl.value = "";
        clearConversationRenderState();
        getOrCreateAssistantGroup("manager");

        controller = new AbortController();
        setStreamingState(true);
        setStatus("Model is reasoning...");

        let finalAnswerReceived = false;

        try {
          const response = await fetch("/chat/stream", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              user_query: question,
              thread_id: threadId,
            }),
            signal: controller.signal,
          });
          if (!response.ok || !response.body) {
            throw new Error(`HTTP ${response.status}`);
          }

          const reader = response.body.getReader();
          const decoder = new TextDecoder("utf-8");
          let buffer = "";

          while (true) {
            const { done, value } = await reader.read();
            if (done) {
              break;
            }
            buffer += decoder.decode(value, { stream: true });
            const chunks = buffer.split("\n\n");
            buffer = chunks.pop() || "";
            for (const chunk of chunks) {
              const payload = parseSSEBlock(chunk);
              if (!payload) {
                continue;
              }
              renderPayload(payload);
              if (payload.role === "integrator" && payload.message_type === "final_answer") {
                finalAnswerReceived = true;
              }
            }
          }

          if (!finalAnswerReceived) {
            finalizePendingExecutorToolCalls("failed");
            finishRoleGroups("stopped");
            appendClientNotice("status", "Final answer was not received. Please check backend logs.");
            setStatus("Stream ended without final answer", true);
          } else {
            finalizePendingExecutorToolCalls("done");
            finishRoleGroups("done");
            setStatus("Completed");
          }
        } catch (error) {
          if (error.name === "AbortError") {
            finalizePendingExecutorToolCalls("failed");
            finishRoleGroups("stopped");
            appendClientNotice("status", "Generation stopped manually.");
            setStatus("Stopped", true);
          } else {
            finalizePendingExecutorToolCalls("failed");
            finishRoleGroups("stopped");
            appendClientNotice("error", `Request error: ${error.message}`);
            setStatus("Request failed", true);
          }
        } finally {
          setStreamingState(false);
          controller = null;
          inputEl.focus();
        }
      }

      sendBtn.addEventListener("click", sendMessage);
      stopBtn.addEventListener("click", () => {
        if (controller) {
          controller.abort();
        }
      });

      inputEl.addEventListener("keydown", (event) => {
        if (event.key === "Enter" && !event.shiftKey) {
          event.preventDefault();
          sendMessage();
        }
      });

      inputEl.focus();
    </script>
  </body>
</html>
